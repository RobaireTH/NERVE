services:
	core:
		build:
			context: .
			dockerfile: packages/core/Dockerfile
		ports:
			- "${CORE_PORT:-8080}:8080"
		env_file: .env
		healthcheck:
			test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
			interval: 10s
			timeout: 5s
			retries: 3

	mcp:
		build:
			context: .
			dockerfile: packages/mcp/Dockerfile
		ports:
			- "${MCP_PORT:-8081}:8081"
		env_file: .env
		depends_on:
			core:
				condition: service_healthy

	fiber:
		image: nervosnetwork/fiber:latest
		ports:
			- "${FIBER_RPC_PORT:-8227}:8227"
			- "${FIBER_P2P_PORT:-8228}:8228"
		volumes:
			- ./fiber-data:/data
		env_file: .env
		command: ["fnn", "--config-dir", "/data"]
		healthcheck:
			test: ["CMD", "curl", "-sf", "-X", "POST", "http://localhost:8227",
			       "-H", "Content-Type: application/json",
			       "-d", "{\"jsonrpc\":\"2.0\",\"id\":1,\"method\":\"node_info\",\"params\":{}}"]
			interval: 15s
			timeout: 5s
			retries: 5

	agent:
		image: node:20-alpine
		working_dir: /workspace
		command: sh -c "npm install -g openclaw && openclaw start --config openclaw.json"
		volumes:
			- ./packages/agent:/workspace
		env_file: .env
		depends_on:
			- core
			- mcp
